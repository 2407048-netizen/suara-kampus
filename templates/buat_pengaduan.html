{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h4 class="mb-4 text-primary"><i class="fas fa-plus-circle me-2"></i>Lapor Cepat</h4>
            <div class="alert alert-info d-flex align-items-center">
                <i class="fas fa-user-secret me-2"></i>
                <div>Identitas Anda akan disembunyikan secara otomatis. Laporan bersifat anonim.</div>
            </div>
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label fw-bold">Judul Laporan</label>
                    <input type="text" name="judul" class="form-control rounded-3" placeholder="Contoh: AC Ruang Lab 3 Tidak Dingin" required>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Kategori</label>
                        <select name="kategori" class="form-select rounded-3" required>
                            <option value="">-- Pilih Kategori --</option>
                            <option value="Fasilitas Kelas">Fasilitas Kelas</option>
                            <option value="Ruangan Lab">Ruangan Lab</option>
                            <option value="Jaringan WiFi">Jaringan WiFi</option>
                            <option value="Kinerja Dosen">Kinerja Dosen</option>
                            <option value="Layanan Kampus">Layanan Kampus</option>
                            <option value="Himpunan/Organisasi">Himpunan/Organisasi</option>
                            <option value="TUK (Tenaga Kependidikan)">TUK (Tenaga Kependidikan)</option>
                            <option value="Prodi/Jurusan">Prodi/Jurusan</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Prioritas</label>
                        <select name="prioritas" class="form-select rounded-3" required>
                            <option value="Rendah">Rendah</option>
                            <option value="Sedang" selected>Sedang</option>
                            <option value="Tinggi">Tinggi</option>
                            <option value="Urgent">🚨 Urgent (Darurat)</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Lokasi Spesifik</label>
                    <input type="text" name="lokasi" class="form-control rounded-3" placeholder="Gedung A, Lantai 2, Ruang 201" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Deskripsi Masalah</label>
                    <textarea name="deskripsi" class="form-control rounded-3" rows="4" placeholder="Jelaskan detail masalah..." required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Foto Bukti (Opsional)</label>
                    <input type="file" name="foto" class="form-control rounded-3" accept="image/*">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-itg btn-lg rounded-3">
                        <i class="fas fa-paper-plane me-2"></i>Kirim Laporan & Generate PDF
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
