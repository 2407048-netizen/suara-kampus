<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Tracking Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }
        .chat-card {
            max-width: 800px;
            margin: 30px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: #fff;
        }
        .chat-header {
            background: #003366;
            color: white;
            padding: 16px 20px;
        }
        .chat-body {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            background: #f9fbfe;
        }
        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: inline-block;
            word-break: break-word;
        }
        .bubble-me {
            background: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .bubble-other {
            background: #e9ecef;
            color: #212529;
            border-bottom-left-radius: 4px;
        }
        .chat-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: white;
        }
    </style>
</head>
<body>
    <div class="chat-card">
        <div class="chat-header">
            <h4 class="mb-1"><i class="fas fa-comments me-2"></i>Realtime Tracking Chat</h4>
            <small>Ticket #{{ ticket_id }}</small>
        </div>

        <div class="chat-body" id="chatMessages">
            <div class="text-muted text-center">Memuat percakapan...</div>
        </div>

        <div class="chat-footer">
            <form id="chatForm">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Ketik pesan..." autocomplete="off" required>
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const ticketId = {{ ticket_id }};
        const senderId = {{ session.user_id }};
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');

        function appendMessage(message, isMine = false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex';
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isMine ? 'bubble-me' : 'bubble-other'}`;
            bubble.innerHTML = `<div>${message}</div>`;
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        socket.on('connect', function () {
            socket.emit('handle_join', { ticket_id: ticketId });
        });

        socket.on('new_message', function (data) {
            const isMine = Number(data.sender_id) === Number(senderId);
            appendMessage(data.message, isMine);
        });

        chatForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            socket.emit('handle_message', {
                ticket_id: ticketId,
                sender_id: senderId,
                message: message
            });

            messageInput.value = '';
            appendMessage(message, true);
        });
    </script>
</body>
</html>
