{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mb-4">
    <div class="col-md-8 text-center">
        <h2 class="mb-4">Statistik Pelayanan Kampus</h2>
        <p class="text-muted">Transparansi adalah kunci kepercayaan. Berikut performa kami.</p>
    </div>
</div>

<div class="row g-4">
    <!-- Kartu 1: Total Laporan -->
    <div class="col-md-4">
        <div class="card h-100 border-primary shadow-sm text-center p-4">
            <div class="card-body">
                <i class="fas fa-file-alt fa-3x text-primary mb-3"></i>
                <h3 class="display-4 fw-bold">{{ total_keluhan }}</h3>
                <p class="text-muted fw-bold">Total Keluhan Masuk</p>
            </div>
        </div>
    </div>

    <!-- Kartu 2: Persentase Selesai -->
    <div class="col-md-4">
        <div class="card h-100 border-success shadow-sm text-center p-4">
            <div class="card-body">
                <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                <h3 class="display-4 fw-bold text-success">{{ persen }}%</h3>
                <p class="text-muted fw-bold">Tingkat Penyelesaian</p>
                <div class="progress mt-2" style="height: 10px;">
                    <div class="progress-bar bg-success" role="progressbar" style="width: {{ persen }}%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Kartu 3: Aspirasi -->
    <div class="col-md-4">
        <div class="card h-100 border-warning shadow-sm text-center p-4">
            <div class="card-body">
                <i class="fas fa-lightbulb fa-3x text-warning mb-3"></i>
                <h3 class="display-4 fw-bold text-warning">{{ total_aspirasi }}</h3>
                <p class="text-muted fw-bold">Ide Mahasiswa Diterima</p>
            </div>
        </div>
    </div>
</div>

<!-- Link Kembali -->
<div class="text-center mt-5">
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-2"></i> Kembali ke Beranda
    </a>
</div>
{% endblock %}
